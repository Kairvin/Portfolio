<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D7E2EA" />
      <stop offset="50%" stop-color="#BBCCD7" />
      <stop offset="100%" stop-color="#646973" />
    </linearGradient>
  </defs>
  <!-- Background matching the site's dark theme -->
  <rect width="100" height="100" rx="25" fill="#0C0C0C" />
  

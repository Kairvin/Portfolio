  <!-- Tech nodes (dots) on the 'K' -->
  <circle cx="65" cy="25" r="6" fill="#D7E2EA" />
  <circle cx="65" cy="75" r="6" fill="#D7E2EA" />
  <circle cx="35" cy="25" r="6" fill="#D7E2EA" />
  <circle cx="35" cy="75" r="6" fill="#D7E2EA" />
